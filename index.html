<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RVJ | GAMER MESSENGER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Fira Code', 'Segoe UI', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Анимированный геймерский фон */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 255, 0.03) 2px,
                rgba(0, 255, 255, 0.03) 4px
            );
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(0%); }
        }

        /* Основной контейнер RVJ */
        .rvj-messenger {
            width: 1300px;
            max-width: 95vw;
            height: 88vh;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), 0 0 10px rgba(255, 0, 255, 0.2);
            display: flex;
            overflow: hidden;
            position: relative;
            font-family: 'Courier New', monospace;
        }

        /* Боковая панель — геймер-контакты */
        .gamer-sidebar {
            width: 32%;
            background: rgba(5, 8, 15, 0.9);
            border-right: 2px solid #00ffff33;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(4px);
        }

        .gamer-header {
            padding: 20px;
            background: linear-gradient(135deg, #0a0f1f, #010101);
            border-bottom: 2px solid #ff00ff;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .gamer-header::after {
            content: '◢◤◢◤';
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 10px;
            color: #0ff;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .rvj-logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
            letter-spacing: 3px;
        }

        .gamer-badge {
            font-size: 12px;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 2px 8px;
            border-radius: 20px;
            background: #0ff11a;
        }

        .player-stats {
            padding: 12px 20px;
            background: #00000055;
            border-bottom: 1px solid #ff00ff55;
            font-size: 11px;
            color: #0ff;
            display: flex;
            justify-content: space-between;
        }

        .search-gamer {
            padding: 15px;
        }

        .search-gamer input {
            width: 100%;
            padding: 10px 15px;
            background: #0a0f1a;
            border: 1px solid #ff00ff77;
            border-radius: 8px;
            color: #0ff;
            font-family: monospace;
            outline: none;
            transition: all 0.3s;
        }

        .search-gamer input:focus {
            border-color: #0ff;
            box-shadow: 0 0 8px #0ff;
        }

        .contacts-gamer {
            flex: 1;
            overflow-y: auto;
        }

        .gamer-contact {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1f2a3e;
            transition: all 0.2s;
            position: relative;
        }

        .gamer-contact:hover {
            background: #0ff11a;
            border-left: 3px solid #0ff;
        }

        .gamer-contact.active {
            background: linear-gradient(90deg, #ff00ff22, #0ff11a);
            border-left: 3px solid #ff00ff;
            box-shadow: inset 0 0 10px #ff00ff33;
        }

        .gamer-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #0ff, #f0f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #000;
            text-shadow: 0 0 3px #fff;
            transform: rotate(2deg);
            box-shadow: 0 0 8px #0ff;
        }

        .gamer-info {
            flex: 1;
        }

        .gamer-name {
            font-weight: bold;
            color: #0ff;
            letter-spacing: 1px;
        }

        .gamer-status {
            font-size: 10px;
            color: #f0f;
            font-family: monospace;
        }

        .gamer-last-msg {
            font-size: 11px;
            color: #88aaff;
            margin-top: 4px;
        }

        .msg-time {
            font-size: 9px;
            color: #6f8faa;
        }

        /* Чат область */
        .chat-gamer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #03060ecc;
        }

        .chat-gamer-header {
            padding: 16px 20px;
            background: #0a0f1a;
            border-bottom: 2px solid #00ffff88;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .gamer-chat-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gamer-chat-title .avatar-small {
            width: 42px;
            height: 42px;
            background: #f0f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .gamer-rank {
            font-size: 11px;
            color: #ffaa44;
            background: #000000aa;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid gold;
        }

        .messages-gamer {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-image: radial-gradient(circle at 10% 20%, #0a0f1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .message-gamer {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: messagePop 0.2s ease;
        }

        @keyframes messagePop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .message-gamer.received {
            align-items: flex-start;
        }

        .message-gamer.sent {
            align-items: flex-end;
            align-self: flex-end;
        }

        .bubble-gamer {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-family: monospace;
            word-wrap: break-word;
            position: relative;
        }

        .received .bubble-gamer {
            background: #11161f;
            border: 1px solid #0ff88a;
            color: #bbffff;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px #00000055;
        }

        .sent .bubble-gamer {
            background: linear-gradient(135deg, #ff00cc33, #00ffff33);
            border: 1px solid #ff44ff;
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 0 8px #ff00ff33;
        }

        .message-time-gamer {
            font-size: 9px;
            margin-top: 5px;
            margin-left: 8px;
            margin-right: 8px;
            color: #77aaff;
            font-family: monospace;
        }

        .input-gamer-area {
            padding: 15px 20px;
            background: #080c14;
            border-top: 1px solid #ff00ff88;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-gamer-area input {
            flex: 1;
            background: #010101dd;
            border: 1px solid #0ff;
            padding: 12px 18px;
            border-radius: 40px;
            color: #0ff;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        .input-gamer-area input:focus {
            box-shadow: 0 0 12px #0ff;
        }

        .gamer-btn {
            background: #0a0f1f;
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .gamer-btn:hover {
            background: #ff00ff44;
            box-shadow: 0 0 15px #ff00ff;
            color: white;
            border-color: #0ff;
        }

        /* скролл */
        .messages-gamer::-webkit-scrollbar, .contacts-gamer::-webkit-scrollbar {
            width: 5px;
        }
        .messages-gamer::-webkit-scrollbar-track {
            background: #0a0f1a;
        }
        .messages-gamer::-webkit-scrollbar-thumb {
            background: #f0f;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .gamer-sidebar {
                width: 40%;
            }
            .message-gamer {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="rvj-messenger">
    <div class="gamer-sidebar">
        <div class="gamer-header">
            <div class="rvj-logo">◢ RVJ ◣</div>
            <div class="gamer-badge">GAMER v2.0</div>
        </div>
        <div class="player-stats">
            <span>🎮 LVL: 99</span>
            <span>🔥 K/D: 4.20</span>
            <span>🏆 WIN STREAK</span>
        </div>
        <div class="search-gamer">
            <input type="text" id="gamerSearch" placeholder="🔍 FIND CLAN MEMBER...">
        </div>
        <div class="contacts-gamer" id="gamerContactsList">
            <!-- динамические контакты -->
        </div>
    </div>

    <div class="chat-gamer">
        <div class="chat-gamer-header">
            <div class="gamer-chat-title" id="gamerChatTitle">
                <div class="avatar-small" id="gamerChatAvatar">GH</div>
                <div>
                    <div style="font-weight:bold;color:#0ff;" id="gamerChatName">Ghost</div>
                    <div class="gamer-rank" id="gamerRank">LEGENDARY ELITE</div>
                </div>
            </div>
            <div class="gamer-badge">🎧 VOICE • CLAN WAR</div>
        </div>
        <div class="messages-gamer" id="gamerMessagesContainer">
            <!-- сообщения -->
        </div>
        <div class="input-gamer-area">
            <input type="text" id="gamerMessageInput" placeholder="[ENTER] TYPE MESSAGE...">
            <button class="gamer-btn" id="gamerSendBtn">➤ SEND</button>
        </div>
    </div>
</div>

<script>
    // -------- ГЕЙМЕРСКИЕ КОНТАКТЫ (RVJ CREW) ----------
    const gamers = [
        { id: 1, name: "GHOST_RVJ", avatar: "GH", rank: "LEGENDARY ELITE", lastMsg: "GG WP! next raid?", time: "22:14", color: "#0ff", status: "online" },
        { id: 2, name: "NEO_N1GHT", avatar: "NN", rank: "DIAMOND SNIPER", lastMsg: "lets destroy enemies", time: "21:56", color: "#ff44ff", status: "in game" },
        { id: 3, name: "RAVEN_VORTEX", avatar: "RV", rank: "CYBER LORD", lastMsg: "clan meeting at 8pm", time: "20:30", color: "#ffaa44", status: "idle" },
        { id: 4, name: "ZER0_SK1LL", avatar: "ZS", rank: "MASTER BLASTER", lastMsg: "need backup!", time: "19:12", color: "#44ffaa", status: "offline" },
        { id: 5, name: "KILLA_BYTE", avatar: "KB", rank: "RAGE QUITTER", lastMsg: "new update pog", time: "17:45", color: "#ff6666", status: "online" }
    ];

    // Сообщения (геймер стиль)
    let gamerMessagesDB = {
        1: [ // Ghost
            { text: "yo! готов к рейду?", type: "received", time: "22:14" },
            { text: "всегда готов! 🔥 как обычно full loot?", type: "sent", time: "22:16" },
            { text: "ага, бери гранаты и медик-кит", type: "received", time: "22:18" },
            { text: "уже загрузился 🤘", type: "sent", time: "22:20" }
        ],
        2: [
            { text: "видел новый скин? 🔫", type: "received", time: "21:56" },
            { text: "да, выглядит эпично, купил себе", type: "sent", time: "21:59" }
        ],
        3: [
            { text: "RVJ клан соберется в 20:00 по серверу", type: "received", time: "20:30" },
            { text: "буду, готовьте дюки", type: "sent", time: "20:32" }
        ],
        4: [
            { text: "нужен хил, враги со всех сторон!", type: "received", time: "19:12" },
            { text: "лечу на помощь! 🚁", type: "sent", time: "19:15" }
        ],
        5: [
            { text: "патч вышел, баланс сломал мету", type: "received", time: "17:45" },
            { text: "ага, теперь дробовики имба", type: "sent", time: "17:50" }
        ]
    };

    let currentGamerId = 1;
    let currentGamerMessages = [...gamerMessagesDB[1]];

    function renderGamerContacts() {
        const container = document.getElementById('gamerContactsList');
        const searchVal = document.getElementById('gamerSearch').value.toLowerCase();
        const filtered = gamers.filter(g => g.name.toLowerCase().includes(searchVal));
        container.innerHTML = '';
        filtered.forEach(g => {
            const div = document.createElement('div');
            div.className = 'gamer-contact';
            if (currentGamerId === g.id) div.classList.add('active');
            div.innerHTML = `
                <div class="gamer-avatar" style="background: linear-gradient(135deg, ${g.color}, #000); box-shadow:0 0 8px ${g.color};">${g.avatar}</div>
                <div class="gamer-info">
                    <div class="gamer-name">${g.name}</div>
                    <div class="gamer-status">🏆 ${g.rank} • ${g.status}</div>
                    <div class="gamer-last-msg">${g.lastMsg}</div>
                </div>
                <div class="msg-time">${g.time}</div>
            `;
            div.addEventListener('click', () => switchGamerChat(g.id));
            container.appendChild(div);
        });
    }

    function switchGamerChat(gamerId) {
        currentGamerId = gamerId;
        const gamer = gamers.find(g => g.id === gamerId);
        if (gamer) {
            document.getElementById('gamerChatName').innerText = gamer.name;
            document.getElementById('gamerChatAvatar').innerText = gamer.avatar;
            document.getElementById('gamerRank').innerText = gamer.rank;
            document.getElementById('gamerChatAvatar').style.background = `linear-gradient(135deg, ${gamer.color}, #0a0f1f)`;
        }
        currentGamerMessages = gamerMessagesDB[gamerId] ? [...gamerMessagesDB[gamerId]] : [];
        renderGamerMessages();
        renderGamerContacts();
    }

    function renderGamerMessages() {
        const container = document.getElementById('gamerMessagesContainer');
        container.innerHTML = '';
        if (!currentGamerMessages.length) {
            const emptyDiv = document.createElement('div');
            emptyDiv.style.textAlign = 'center';
            emptyDiv.style.color = '#88aaff';
            emptyDiv.style.padding = '30px';
            emptyDiv.innerHTML = '💀 НЕТ СООБЩЕНИЙ... НАПИШИ ПЕРВЫМ 💀';
            container.appendChild(emptyDiv);
        } else {
            currentGamerMessages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message-gamer', msg.type);
                msgDiv.innerHTML = `
                    <div class="bubble-gamer">${escapeHtmlGamer(msg.text)}</div>
                    <div class="message-time-gamer">⚡ ${msg.time}</div>
                `;
                container.appendChild(msgDiv);
            });
        }
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtmlGamer(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function sendGamerMessage() {
        const input = document.getElementById('gamerMessageInput');
        const text = input.value.trim();
        if (text === '') return;
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        const newMsg = {
            text: text,
            type: 'sent',
            time: timeStr
        };
        currentGamerMessages.push(newMsg);
        gamerMessagesDB[currentGamerId] = [...currentGamerMessages];
        const gamer = gamers.find(g => g.id === currentGamerId);
        if (gamer) {
            gamer.lastMsg = text.length > 35 ? text.slice(0,35)+'...' : text;
            gamer.time = timeStr;
        }
        input.value = '';
        renderGamerMessages();
        renderGamerContacts();

        // Геймерский автоОТВЕТ (с рандомными репликами)
        clearTimeout(window.gamerReplyTimer);
        window.gamerReplyTimer = setTimeout(() => {
            if (currentGamerId === gamer?.id) {
                const gamerReplies = [
                    "🔥 КАЛИБР 50! ХЭДШОТ!", "🎮 GG WP, братан!", "⚔️ ВЗЯЛ ЛОБАЧА", 
                    "💀 ТЫ РАЗРУШИТЕЛЬ", "🏆 РАШИМ А, ГОУ", "🤘 RVJ В КРОВИ",
                    "🔫 ДОМИНАТОР", "💥 АГРЕССИВНЫЙ ПЛЕЙ"
                ];
                const randomReply = gamerReplies[Math.floor(Math.random() * gamerReplies.length)];
                const replyTime = new Date();
                const replyTimeStr = `${replyTime.getHours().toString().padStart(2,'0')}:${replyTime.getMinutes().toString().padStart(2,'0')}`;
                const receivedMsg = {
                    text: randomReply,
                    type: 'received',
                    time: replyTimeStr
                };
                currentGamerMessages.push(receivedMsg);
                gamerMessagesDB[currentGamerId] = [...currentGamerMessages];
                const contact = gamers.find(c => c.id === currentGamerId);
                if(contact) {
                    contact.lastMsg = randomReply;
                    contact.time = replyTimeStr;
                }
                renderGamerMessages();
                renderGamerContacts();
            }
        }, 1800);
    }

    // обработчики
    document.getElementById('gamerSendBtn').addEventListener('click', sendGamerMessage);
    document.getElementById('gamerMessageInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendGamerMessage();
    });
    document.getElementById('gamerSearch').addEventListener('input', () => renderGamerContacts());

    // init
    renderGamerContacts();
    switchGamerChat(1);
    document.getElementById('gamerMessageInput').focus();
</script>
</body>
</html>
